<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeBron James Trivia Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a1628;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f5c518;
      letter-spacing: 0.02em;
    }

    header p {
      font-size: 1rem;
      color: #9aafc7;
      margin-top: 0.4rem;
    }

    #quiz-wrap {
      width: 100%;
      max-width: 640px;
    }

    #scorebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    #progress-track {
      flex: 1;
      height: 6px;
      background: #1e3150;
      border-radius: 4px;
      margin: 0 16px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: #f5c518;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .score-pill {
      font-size: 13px;
      font-weight: 600;
      color: #9aafc7;
    }

    #question-card {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 0.75rem;
    }

    #q-num {
      font-size: 12px;
      color: #9aafc7;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #q-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: #eaf0fb;
      line-height: 1.5;
    }

    .stat-tag {
      display: inline-block;
      font-size: 12px;
      background: #f5c51822;
      color: #f5c518;
      border: 1px solid #f5c51844;
      border-radius: 4px;
      padding: 3px 10px;
      margin-bottom: 0.85rem;
      font-weight: 600;
    }

    #choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .choice-btn {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #eaf0fb;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      transition: background 0.15s, border-color 0.15s;
    }

    .choice-btn:hover:not(:disabled) {
      background: #1a2f50;
      border-color: #f5c518;
    }

    .choice-btn.correct {
      background: #0e3322;
      border-color: #2a9d5c;
      color: #6ee09e;
    }

    .choice-btn.wrong {
      background: #3a1010;
      border-color: #a32d2d;
      color: #f09595;
    }

    .choice-btn.reveal {
      background: #0e3322;
      border-color: #2a9d5c;
      color: #6ee09e;
    }

    .choice-btn:disabled { cursor: default; }

    #feedback-box {
      min-height: 52px;
      font-size: 14px;
      color: #9aafc7;
      line-height: 1.65;
      padding: 0 0.25rem;
      margin-bottom: 1rem;
    }

    #next-btn {
      width: 100%;
      padding: 13px;
      background: #f5c518;
      border: none;
      border-radius: 8px;
      color: #0a1628;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      transition: background 0.15s;
    }

    #next-btn:hover { background: #e0b215; }

    #result-card {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      text-align: center;
      display: none;
    }

    #result-score {
      font-size: 64px;
      font-weight: 700;
      color: #f5c518;
    }

    #result-label {
      font-size: 14px;
      color: #9aafc7;
      margin-bottom: 1.5rem;
    }

    #result-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #eaf0fb;
      margin-bottom: 0.75rem;
    }

    #result-sub {
      font-size: 15px;
      color: #9aafc7;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    #restart-btn {
      padding: 13px 40px;
      background: #f5c518;
      border: none;
      border-radius: 8px;
      color: #0a1628;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart-btn:hover { background: #e0b215; }

    footer {
      margin-top: 2.5rem;
      font-size: 12px;
      color: #3d5470;
      text-align: center;
    }

    @media (max-width: 480px) {
      #choices { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>LeBron James Trivia Quiz</h1>
    <p>10 questions. How well do you know the King?</p>
  </header>

  <div id="quiz-wrap">
    <div id="scorebar">
      <span class="score-pill" id="q-counter">1 / 10</span>
      <div id="progress-track"><div id="progress-fill" style="width:10%"></div></div>
      <span class="score-pill" id="score-display">0 pts</span>
    </div>

    <div id="question-card">
      <div id="q-num"></div>
      <div id="q-text"></div>
    </div>

    <div id="stat-tag-wrap"></div>
    <div id="choices"></div>
    <div id="feedback-box"></div>
    <button id="next-btn">Next question</button>

    <div id="result-card">
      <div id="result-score"></div>
      <div id="result-label">out of 10</div>
      <div id="result-title"></div>
      <div id="result-sub"></div>
      <button id="restart-btn">Play again</button>
    </div>
  </div>

  <footer>
    <a href="index.html" style="color:#3d5470; text-decoration:underline;">Back to main site</a>
  </footer>

  <script>
    const questions = [
      {
        q: "LeBron James was selected with which overall pick in the 2003 NBA Draft?",
        choices: ["1st", "2nd", "3rd", "5th"],
        answer: 0,
        fact: "The Cleveland Cavaliers selected LeBron #1 overall in 2003, right out of St. Vincent–St. Mary High School in Akron, Ohio.",
        tag: "Draft"
      },
      {
        q: "How many NBA championships has LeBron James won as of 2024?",
        choices: ["2", "3", "4", "5"],
        answer: 2,
        fact: "LeBron won titles in 2012 and 2013 with Miami, 2016 with Cleveland, and 2020 with the Lakers — four total.",
        tag: "Championships"
      },
      {
        q: "LeBron surpassed whose all-time NBA scoring record in February 2023?",
        choices: ["Michael Jordan", "Kobe Bryant", "Kareem Abdul-Jabbar", "Karl Malone"],
        answer: 2,
        fact: "LeBron passed Kareem Abdul-Jabbar's record of 38,387 points on February 7, 2023, becoming the all-time leading scorer in NBA history.",
        tag: "Records"
      },
      {
        q: "Which team did LeBron NOT play for during his NBA career?",
        choices: ["Cleveland Cavaliers", "Miami Heat", "Chicago Bulls", "Los Angeles Lakers"],
        answer: 2,
        fact: "LeBron played for Cleveland (2003–2010, 2014–2018), Miami (2010–2014), and the Lakers (2018–present). He never played for Chicago.",
        tag: "Teams"
      },
      {
        q: "LeBron James grew up in which city?",
        choices: ["Columbus, OH", "Cincinnati, OH", "Akron, OH", "Cleveland, OH"],
        answer: 2,
        fact: "LeBron was born and raised in Akron, Ohio. His hometown roots are central to his identity — he famously promised to bring a title to Northeast Ohio.",
        tag: "Background"
      },
      {
        q: "In what year did LeBron win his first NBA MVP award?",
        choices: ["2007", "2008", "2009", "2010"],
        answer: 2,
        fact: "LeBron won his first MVP in 2009 with the Cleveland Cavaliers, beginning a run of four total MVPs (2009, 2010, 2012, 2013).",
        tag: "Awards"
      },
      {
        q: "LeBron's famous 'Decision' in 2010 announced he was leaving Cleveland for which team?",
        choices: ["Los Angeles Lakers", "Boston Celtics", "Chicago Bulls", "Miami Heat"],
        answer: 3,
        fact: "'I'm going to take my talents to South Beach' — LeBron announced his move to the Miami Heat in a televised special, joining Dwyane Wade and Chris Bosh.",
        tag: "Moments"
      },
      {
        q: "Which nickname is LeBron James most famously known by?",
        choices: ["The King", "The Black Mamba", "The Answer", "The Truth"],
        answer: 0,
        fact: "LeBron is known as 'King James' or 'The King.' The other nicknames belong to Kobe Bryant (Black Mamba), Allen Iverson (The Answer), and Paul Pierce (The Truth).",
        tag: "Nicknames"
      },
      {
        q: "LeBron's famous block in Game 7 of the 2016 Finals sealed a win against which opponent?",
        choices: ["Golden State Warriors", "San Antonio Spurs", "Oklahoma City Thunder", "Boston Celtics"],
        answer: 0,
        fact: "LeBron's chase-down block of Andre Iguodala in the final minutes of Game 7 is one of the most iconic plays in Finals history. Cleveland won 93–89.",
        tag: "Moments"
      },
      {
        q: "LeBron James attended which high school, famously covered by national media before he was drafted?",
        choices: ["Oak Hill Academy", "Findlay Prep", "St. Vincent–St. Mary", "Montverde Academy"],
        answer: 2,
        fact: "St. Vincent–St. Mary High School in Akron, OH — LeBron's games were so hyped they were broadcast on ESPN. His team was nationally ranked all four years.",
        tag: "Background"
      }
    ];

    let current = 0, score = 0, answered = false;
    const shuffled = questions.slice().sort(() => Math.random() - 0.5);

    function render() {
      const q = shuffled[current];
      document.getElementById('q-counter').textContent = (current + 1) + ' / ' + shuffled.length;
      document.getElementById('progress-fill').style.width = ((current + 1) / shuffled.length * 100) + '%';
      document.getElementById('score-display').textContent = score + ' pts';
      document.getElementById('q-num').textContent = 'Question ' + (current + 1);
      document.getElementById('q-text').textContent = q.q;
      document.getElementById('stat-tag-wrap').innerHTML = '<span class="stat-tag">' + q.tag + '</span>';
      document.getElementById('feedback-box').textContent = '';
      document.getElementById('next-btn').style.display = 'none';
      answered = false;

      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = '';
      q.choices.forEach(function(c, i) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c;
        btn.onclick = function() { handleAnswer(i); };
        choicesEl.appendChild(btn);
      });
    }

    function handleAnswer(idx) {
      if (answered) return;
      answered = true;
      const q = shuffled[current];
      const btns = document.querySelectorAll('.choice-btn');
      btns.forEach(function(b) { b.disabled = true; });

      if (idx === q.answer) {
        score++;
        btns[idx].classList.add('correct');
        document.getElementById('feedback-box').textContent = 'Correct! ' + q.fact;
      } else {
        btns[idx].classList.add('wrong');
        btns[q.answer].classList.add('reveal');
        document.getElementById('feedback-box').textContent = 'Not quite. ' + q.fact;
      }

      document.getElementById('score-display').textContent = score + ' pts';
      const nextBtn = document.getElementById('next-btn');
      nextBtn.style.display = 'block';
      nextBtn.textContent = current < shuffled.length - 1 ? 'Next question' : 'See my results';
    }

    document.getElementById('next-btn').onclick = function() {
      current++;
      if (current >= shuffled.length) {
        showResult();
      } else {
        render();
      }
    };

    function showResult() {
      document.getElementById('question-card').style.display = 'none';
      document.getElementById('stat-tag-wrap').style.display = 'none';
      document.getElementById('choices').style.display = 'none';
      document.getElementById('feedback-box').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('scorebar').style.display = 'none';

      var title, sub;
      if (score === 10) {
        title = "Perfect score — you're the GOAT of LeBron trivia!";
        sub = "10 out of 10. You know LeBron's career better than most analysts. Respect.";
      } else if (score >= 8) {
        title = "Strong ring!";
        sub = score + " out of 10. You clearly follow LeBron closely. Just a couple details slipped past you.";
      } else if (score >= 6) {
        title = "Not bad, rookie.";
        sub = score + " out of 10. A solid performance — but a true LeBron fan can do better. Play again?";
      } else if (score >= 4) {
        title = "Needs more film study.";
        sub = score + " out of 10. LeBron has a long career — there's a lot to learn. Give it another shot!";
      } else {
        title = "Yikes — LeBron would be disappointed.";
        sub = score + " out of 10. Time to watch some highlights and come back stronger.";
      }

      document.getElementById('result-score').textContent = score;
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-sub').textContent = sub;
      document.getElementById('result-card').style.display = 'block';
    }

    document.getElementById('restart-btn').onclick = function() {
      current = 0;
      score = 0;
      shuffled.sort(() => Math.random() - 0.5);
      document.getElementById('question-card').style.display = 'block';
      document.getElementById('stat-tag-wrap').style.display = 'block';
      document.getElementById('choices').style.display = 'grid';
      document.getElementById('feedback-box').style.display = 'block';
      document.getElementById('result-card').style.display = 'none';
      document.getElementById('scorebar').style.display = 'flex';
      render();
    };

    render();
  </script>

</body>
</html>
